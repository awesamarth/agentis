<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Agentis Surfaces Visual</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@700;800&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #f8f3ea;
        --ink: #151310;
        --muted: #6b665d;
        --line: #d8cfbd;
        --panel: #fffefa;
        --green: #527744;
        --blue: #536fe5;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
        background: var(--bg);
      }

      body {
        display: grid;
        place-items: center;
        padding: 24px;
        font-family: "DM Sans", system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
        color: var(--ink);
      }

      .canvas {
        width: 560px;
        height: 390px;
        position: relative;
        background: var(--bg);
        overflow: hidden;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 18px;
        width: 100%;
      }

      .card {
        height: 148px;
        background: var(--panel);
        border: 1.5px solid var(--line);
        border-radius: 10px;
        box-shadow: 9px 9px 0 rgba(28, 24, 18, 0.07);
        overflow: hidden;
      }

      .card.dark {
        background: var(--ink);
        border-color: var(--ink);
        color: var(--bg);
      }

      .bar {
        height: 30px;
        display: flex;
        align-items: center;
        gap: 7px;
        border-bottom: 1px solid var(--line);
        padding: 0 13px;
        color: var(--muted);
        font-family: "DM Mono", monospace;
        font-size: 10px;
        font-weight: 500;
        text-transform: uppercase;
      }

      .dark .bar {
        border-color: rgba(245, 240, 232, 0.18);
        color: rgba(245, 240, 232, 0.72);
      }

      .dot {
        width: 7px;
        height: 7px;
        border-radius: 999px;
        background: #79946b;
      }

      .dot:first-child {
        background: #d6725e;
      }

      .dot:nth-child(2) {
        background: #e0b65a;
      }

      .body {
        height: 118px;
        padding: 16px;
      }

      .dashboard-body {
        display: grid;
        grid-template-columns: 76px 1fr;
        gap: 14px;
        align-items: center;
        padding: 13px 16px;
      }

      .mini-wallet {
        width: 76px;
        height: 76px;
        border: 1.5px solid var(--ink);
        border-radius: 0;
        background: var(--ink);
        color: var(--bg);
        display: grid;
        place-items: center;
      }

      .mini-wallet strong {
        font-family: "DM Mono", monospace;
        font-size: 34px;
        font-weight: 500;
      }

      .line {
        height: 9px;
        border-radius: 99px;
        background: #ebe3d7;
        margin-bottom: 8px;
      }

      .line.short {
        width: 70%;
      }

      .chips {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 7px;
        margin-top: 11px;
      }

      .chip {
        height: 24px;
        border: 1px solid var(--line);
        border-radius: 7px;
        display: grid;
        place-items: center;
        color: var(--muted);
        font-family: "DM Mono", monospace;
        font-size: 10px;
        font-weight: 500;
      }

      .terminal {
        font-family: "DM Mono", monospace;
        font-size: 14px;
        line-height: 1.7;
      }

      .prompt {
        color: #9bd983;
      }

      .ok {
        color: #c8f46a;
      }

      pre {
        margin: 0;
        font-family: "DM Mono", monospace;
        font-size: 12px;
        line-height: 1.5;
        white-space: pre-wrap;
      }

      .blue {
        color: var(--blue);
      }

      .green {
        color: var(--green);
      }

      .skill {
        position: absolute;
        left: 74px;
        right: 74px;
        bottom: 0;
        height: 48px;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 12px;
        background: #fbf8f0;
        border: 1.5px solid var(--line);
        border-radius: 10px;
        color: var(--muted);
        font-family: "DM Mono", monospace;
        font-size: 12px;
        font-weight: 500;
      }

      .skill strong {
        color: var(--ink);
      }
    </style>
  </head>
  <body>
    <main class="canvas" aria-label="Agentis product surfaces visual">
      <section class="grid">
        <article class="card">
          <div class="bar"><span class="dot"></span><span class="dot"></span><span class="dot"></span>Dashboard</div>
          <div class="body dashboard-body">
            <div class="mini-wallet"><strong>A</strong></div>
            <div>
              <div class="line"></div>
              <div class="line short"></div>
              <div class="chips">
                <div class="chip">pay</div>
                <div class="chip">limit</div>
                <div class="chip">private</div>
                <div class="chip">earn</div>
              </div>
            </div>
          </div>
        </article>

        <article class="card dark">
          <div class="bar"><span class="dot"></span><span class="dot"></span><span class="dot"></span>CLI</div>
          <div class="body terminal">
            <span class="prompt">$</span> agentis wallet create<br />
            --name <span class="ok">my-agent</span><br />
            wallet <span class="ok">created</span><br />
          </div>
        </article>

        <article class="card">
          <div class="bar"><span class="dot"></span><span class="dot"></span><span class="dot"></span>SDK</div>
          <div class="body">
            <pre><span class="blue">const</span> agent =
  <span class="blue">await</span> AgentisClient.create(...)

<span class="blue">await</span> agent.fetch(url)</pre>
          </div>
        </article>

        <article class="card">
          <div class="bar"><span class="dot"></span><span class="dot"></span><span class="dot"></span>MCP</div>
          <div class="body">
            <pre>{
  tool: <span class="green">"privacy_create_utxo"</span>,
  amount: <span class="green">"0.01 SOL"</span>
}</pre>
          </div>
        </article>
      </section>

      <aside class="skill">
        <strong>SKILL.md</strong>
        <span>agent-readable context and runbook</span>
      </aside>
    </main>
  </body>
</html>
