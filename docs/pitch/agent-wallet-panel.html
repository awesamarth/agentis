<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Agentis Agent Wallet Panel</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
    <style>
      :root {
        --bg: #f8f3ea;
        --card: #ffffff;
        --ink: #17130f;
        --muted: #6b6459;
        --line: #d9d0be;
        --soft: #fbfaf7;
        --soft-strong: #ece5d8;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: var(--bg);
        font-family: "DM Sans", Arial, sans-serif;
        color: var(--ink);
      }

      .stage {
        width: 980px;
        height: 560px;
        display: grid;
        place-items: center;
        background: var(--bg);
      }

      .wallet {
        width: 620px;
        border: 2px solid var(--line);
        background: var(--card);
        border-radius: 18px;
        padding: 34px 36px 30px;
        box-shadow: 16px 18px 0 rgba(23, 19, 15, 0.06);
      }

      .top {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 28px;
        padding-bottom: 26px;
        border-bottom: 1px solid var(--line);
      }

      .agent-name {
        font-family: "DM Mono", monospace;
        font-size: 16px;
        font-weight: 500;
        letter-spacing: 0.04em;
        margin: 0 0 8px;
      }

      .address {
        font-family: "DM Mono", monospace;
        font-size: 11px;
        color: var(--muted);
        letter-spacing: 0.05em;
        margin: 0;
      }

      .status {
        font-family: "DM Mono", monospace;
        font-size: 10px;
        font-weight: 500;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: var(--muted);
        border: 1px solid var(--line);
        background: var(--soft);
        padding: 8px 10px;
        border-radius: 999px;
        white-space: nowrap;
      }

      .balance {
        padding: 30px 0 26px;
      }

      .balance-label {
        font-family: "DM Mono", monospace;
        font-size: 10px;
        font-weight: 500;
        color: var(--muted);
        letter-spacing: 0.12em;
        text-transform: uppercase;
        margin: 0 0 8px;
      }

      .amount {
        font-family: "DM Mono", monospace;
        font-size: 58px;
        line-height: 0.95;
        font-weight: 500;
        letter-spacing: -0.01em;
        margin: 0;
      }

      .meta {
        font-family: "DM Mono", monospace;
        font-size: 12px;
        color: var(--muted);
        margin-top: 10px;
      }

      .actions {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 12px;
        margin-bottom: 22px;
      }

      .action {
        min-height: 76px;
        border: 1.5px solid var(--line);
        border-radius: 12px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 6px;
        background: var(--soft);
      }

      .action svg {
        width: 22px;
        height: 22px;
        stroke-width: 2.2;
        color: var(--muted);
        stroke: var(--muted);
      }

      .action span {
        font-family: "DM Mono", monospace;
        font-size: 11px;
        font-weight: 500;
        letter-spacing: 0.06em;
      }

      .activity {
        border-top: 1px solid var(--line);
        padding-top: 18px;
        display: grid;
        gap: 12px;
      }

      .row {
        display: grid;
        grid-template-columns: 92px 1fr auto;
        align-items: center;
        gap: 14px;
        font-family: "DM Mono", monospace;
        font-size: 11px;
      }

      .tag {
        font-weight: 500;
        color: var(--muted);
        text-transform: uppercase;
        letter-spacing: 0.1em;
        font-size: 9px;
      }

      .desc {
        color: var(--ink);
      }

      .ok {
        color: var(--ink);
        font-weight: 500;
      }
    </style>
  </head>
  <body>
    <main class="stage">
      <section class="wallet" aria-label="Agent wallet dashboard mockup">
        <div class="top">
          <div>
            <p class="agent-name">agent-wallet-01</p>
            <p class="address">7MoLfx...9L1Ws</p>
          </div>
          <div class="status">policy active</div>
        </div>

        <div class="balance">
          <p class="balance-label">available balance</p>
          <p class="amount">$128.40</p>
          <div class="meta">USDC + SOL controlled by Agentis</div>
        </div>

        <div class="actions">
          <div class="action pay">
            <svg viewBox="0 0 24 24" fill="none">
              <rect x="3" y="6" width="18" height="12" rx="2" />
              <path d="M7 12h5" />
              <path d="M16 10h2v4h-2z" />
            </svg>
            <span>pay</span>
          </div>
          <div class="action limit">
            <svg viewBox="0 0 24 24" fill="none">
              <path d="M12 3l7 4v5c0 4.5-3 7.5-7 9-4-1.5-7-4.5-7-9V7l7-4z" />
              <path d="M8.5 12h7" />
            </svg>
            <span>limit</span>
          </div>
          <div class="action private">
            <svg viewBox="0 0 24 24" fill="none">
              <path d="M3 3l18 18" />
              <path d="M10.6 10.6a2 2 0 0 0 2.8 2.8" />
              <path d="M9.2 5.5A9.8 9.8 0 0 1 12 5c5 0 8.5 4.2 9.5 7a11.8 11.8 0 0 1-2.1 3.4" />
              <path d="M6.2 6.8A12.2 12.2 0 0 0 2.5 12c1 2.8 4.5 7 9.5 7 1.4 0 2.7-.3 3.8-.9" />
            </svg>
            <span>private</span>
          </div>
          <div class="action earn">
            <svg viewBox="0 0 24 24" fill="none">
              <path d="M4 17l5-5 4 4 7-8" />
              <path d="M15 8h5v5" />
            </svg>
            <span>earn</span>
          </div>
        </div>

        <div class="activity">
          <div class="row">
            <div class="tag">paid</div>
            <div class="desc">x402 API request</div>
            <div class="ok">$0.01</div>
          </div>
          <div class="row">
            <div class="tag">policy</div>
            <div class="desc">daily budget check</div>
            <div class="ok">OK</div>
          </div>
          <div class="row">
            <div class="tag">earn</div>
            <div class="desc">USDC supplied to Jupiter Earn</div>
            <div class="ok">$42.00</div>
          </div>
        </div>
      </section>
    </main>
  </body>
</html>
